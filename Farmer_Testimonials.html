<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<title>Farmer Testimonials</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: url("BANNER.jpg") no-repeat center / cover;
}

h2 {
  margin: 12px auto;
  text-align: center;
  font-size: 24px;
  color: #fff;
  background: rgba(255,0,0,0.8);
  padding: 10px 14px;
  border-radius: 8px;
  width: fit-content;
}

.form-row { margin-bottom: 12px; }
label { font-weight: bold; color: red; }

input, select {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 14px;
  background: #0a7a6a;
  color: #fff;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  margin-bottom: 10px;
}

/* PREVIEW */
#stage {
  position: relative;
  max-width: 1280px;
  margin: auto;
}

#bg { width: 100%; }

#video {
  position: absolute;
  left: 18%;
  top: 22%;
  width: 80%;
  height: 65%;
  object-fit: cover;
  border-radius: 20px;
}

#details {
  position: absolute;
  bottom: 14%;
  left: 20%;
  width: 80%;
  background: rgba(0,0,0,0.6);
  color: yellow;
  padding: 8px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  border-radius: 10px;
  text-shadow: 2px 2px 6px #000;
}

canvas { display: none; }
</style>
</head>

<body>

<h2>FARMER TESTIMONIALS</h2>

<div class="form-row">
<label>ಉತ್ಪನ್ನ</label>
<select id="product">
  <option value="">-- ಆಯ್ಕೆಮಾಡಿ --</option>
  <option value="RESONEX">RESONEX</option>
  <option value="TIRRACTO">TIRRACTO</option>
  <option value="RHYME">RHYME</option>
  <option value="VAYOBEL">VAYOBEL</option>
</select>
</div>

<div class="form-row"><label>ರೈತರ ಹೆಸರು</label><input id="farmer"></div>

<div class="form-row">
<label>ಮೊಬೈಲ್</label>
<input id="mobile" type="tel" inputmode="numeric" maxlength="10">
</div>

<div class="form-row"><label>ಗ್ರಾಮ</label><input id="village"></div>
<div class="form-row"><label>ಜಿಲ್ಲೆ</label><input id="district"></div>

<div class="form-row">
  <label>Video (Record / Upload)</label>
  <input
    type="file"
    id="videoInput"
    accept="video/*">
</div>

<button onclick="exportVideo()">⬇ Download Final Video</button>


<!-- PREVIEW -->
<div id="stage">
  <img id="bg">
  <video id="video" controls playsinline></video>
  <div id="details"></div>
</div>

<canvas id="canvas" width="1280" height="720"></canvas>

<script>
const bannerMap = {
  RESONEX:"BG_RESONEX.png",
  TIRRACTO:"BG_TIRRACTO.png",
  RHYME:"BG_RHYME.png",
  VAYOBEL:"BG_VAYOBEL.png"
};

const product = document.getElementById("product");
const bg = document.getElementById("bg");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const farmer = document.getElementById("farmer");
const mobile = document.getElementById("mobile");
const village = document.getElementById("village");
const district = document.getElementById("district");
const details = document.getElementById("details");
const videoInput = document.getElementById("videoInput");

let selectedVideo = null;

/* Mobile number strict numeric */
mobile.addEventListener("input", () => {
  mobile.value = mobile.value.replace(/[^0-9]/g,"");
});

/* Banner change */
product.onchange = () => bg.src = bannerMap[product.value] || "";

/* Video select (record or gallery) */
videoInput.onchange = e => {
  selectedVideo = e.target.files[0];
  if (!selectedVideo) return;
  video.src = URL.createObjectURL(selectedVideo);
};

/* Overlay update */
function updateDetails() {
  details.innerText =
    `Farmer: ${farmer.value} | ${village.value}, ${district.value} | Mob: ${mobile.value}`;
}
[farmer,mobile,village,district].forEach(el =>
  el.addEventListener("input", updateDetails)
);

/* Validation */
function validate() {
  if (!product.value) return alert("ಉತ್ಪನ್ನ ಆಯ್ಕೆಮಾಡಿ"), false;
  if (!farmer.value.trim()) return alert("ರೈತರ ಹೆಸರು ನಮೂದಿಸಿ"), false;
  if (mobile.value.length !== 10) return alert("10 ಅಂಕಿಯ ಮೊಬೈಲ್ ಸಂಖ್ಯೆ"), false;
  if (!village.value.trim()) return alert("ಗ್ರಾಮ ನಮೂದಿಸಿ"), false;
  if (!district.value.trim()) return alert("ಜಿಲ್ಲೆ ನಮೂದಿಸಿ"), false;
  if (!selectedVideo) return alert("ವೀಡಿಯೋ ಆಯ್ಕೆಮಾಡಿ"), false;
  return true;
}

/* Export with MP4 preference */
function exportVideo() {

  if (!validate()) return;

  const canvasStream = canvas.captureStream(30);
  const videoStream = video.captureStream();

  const finalStream = new MediaStream([
    ...canvasStream.getVideoTracks(),
    ...videoStream.getAudioTracks()
  ]);

  let mimeType = "video/mp4";
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = "video/webm";
  }

  const recorder = new MediaRecorder(finalStream, { mimeType });
  const chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  video.currentTime = 0;
  video.play();

  function draw() {
    ctx.clearRect(0,0,1280,720);
    ctx.drawImage(bg,0,0,1280,720);
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(230,160,975,470,28);
    ctx.clip();
    ctx.drawImage(video,230,160,975,470);
    ctx.restore();

    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(230,540,900,80);

    ctx.fillStyle="yellow";
    ctx.font="bold 28px Arial";
    ctx.textAlign="center";
    ctx.fillText(details.innerText,680,590);

    if (!video.ended) requestAnimationFrame(draw);
  }
  draw();

  video.onended = () => {
    recorder.stop();
    recorder.onstop = () => {
      const blob = new Blob(chunks,{type:mimeType});
      const ext = mimeType.includes("mp4") ? "mp4" : "webm";

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${product.value}-${farmer.value}-${mobile.value}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
  };
}
</script>

</body>
</html>
