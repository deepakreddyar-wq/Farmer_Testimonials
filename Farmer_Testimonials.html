<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<title>Farmer Testimonials</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  background: url("Banner.jpg") no-repeat center / cover;
}

h2 {
  margin: 12px auto;
  text-align: center;
  font-size: 24px;
  color: #fff;
  background: rgba(255,0,0,0.8);
  padding: 10px 14px;
  border-radius: 8px;
  width: fit-content;
}

.form-row { margin-bottom: 12px; }
label { font-weight: bold; color: red; }
input, select { width: 100%; padding: 10px; font-size: 16px; }

button {
  width: 100%;
  padding: 14px;
  background: #0a7a6a;
  color: #fff;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  margin-bottom: 10px;
}

/* PREVIEW */
#stage {
  position: relative;
  max-width: 1280px;
  margin: auto;
}

#bg { width: 100%; }

#video {
  position: absolute;
  left: 18%;
  top: 22%;
  width: 80%;
  height: 65%;
  object-fit: cover;
  border-radius: 20px;
}

#details {
  position: absolute;
  bottom: 14%;
  left: 20%;
  width: 75%;
  background: rgba(0,0,0,0.6);
  color: yellow;
  padding: 10px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  border-radius: 10px;
}

canvas { display: none; }
</style>
</head>

<body>

<h2>FARMER TESTIMONIALS</h2>

<div class="form-row">
<label>ಉತ್ಪನ್ನ</label>
<select id="product">
  <option value="">-- ಆಯ್ಕೆಮಾಡಿ --</option>
  <option>RESONEX</option>
  <option>TIRRACTO</option>
  <option>RHYME</option>
  <option>VAYOBEL</option>
</select>
</div>

<div class="form-row"><label>ರೈತರ ಹೆಸರು</label><input id="farmer"></div>
<div class="form-row"><label>ಮೊಬೈಲ್</label><input id="mobile" maxlength="10"></div>
<div class="form-row"><label>ಗ್ರಾಮ</label><input id="village"></div>
<div class="form-row"><label>ಜಿಲ್ಲೆ</label><input id="district"></div>

<div class="form-row"><label>Video</label><input type="file" id="videoInput" accept="video/*" capture></div>

<hr>

<div class="form-row">
<label>Audio Option</label>
<select id="audioMode">
  <option value="video">Use Video Audio</option>
  <option value="upload">Upload Audio</option>
  <option value="record">Record New Audio</option>
</select>
</div>

<div class="form-row" id="audioUpload" style="display:none">
<input type="file" id="audioFile" accept="audio/*">
</div>

<div class="form-row" id="audioRecord" style="display:none">
<button onclick="startAudio()">🎙 Start Recording</button>
<button onclick="stopAudio()">⏹ Stop Recording</button>
</div>

<button onclick="exportVideo()">⬇ Download Final Video</button>

<!-- PREVIEW -->
<div id="stage">
  <img id="bg">
  <video id="video" controls playsinline></video>
  <div id="details"></div>
</div>

<canvas id="canvas" width="1280" height="720"></canvas>

<script>
const bannerMap = {
  RESONEX:"BG_RESONEX.png",
  TIRRACTO:"BG_TIRRACTO.png",
  RHYME:"BG_RHYME.png",
  VAYOBEL:"BG_VAYOBEL.png"
};

const product = document.getElementById("product");
const bg = document.getElementById("bg");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const details = document.getElementById("details");

let selectedVideo, audioBlob, audioRecorder;

/* Numeric mobile */
mobile.oninput = e => e.target.value = e.target.value.replace(/\D/g,'');

/* Banner */
product.onchange = () => bg.src = bannerMap[product.value];

/* Video */
videoInput.onchange = e => {
  selectedVideo = e.target.files[0];
  video.src = URL.createObjectURL(selectedVideo);
};

/* Overlay text */
["farmer","mobile","village","district"].forEach(id =>
  document.getElementById(id).oninput = () => {
    details.innerHTML =
      `Farmer: ${farmer.value} | ${village.value}, ${district.value} | Mob: ${mobile.value}`;
  }
);

/* Audio mode */
audioMode.onchange = () => {
  audioUpload.style.display = audioMode.value==="upload"?"block":"none";
  audioRecord.style.display = audioMode.value==="record"?"block":"none";
};

/* Record audio */
async function startAudio() {
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  audioRecorder = new MediaRecorder(stream);
  audioBlob = null;
  const chunks = [];
  audioRecorder.ondataavailable = e => chunks.push(e.data);
  audioRecorder.onstop = () => audioBlob = new Blob(chunks,{type:"audio/webm"});
  audioRecorder.start();
}

function stopAudio() {
  if (audioRecorder) audioRecorder.stop();
}

/* Export */
async function exportVideo() {

  const videoStream = canvas.captureStream(30);
  let tracks = [...videoStream.getVideoTracks()];

  if (audioMode.value==="video") {
    const vStream = video.captureStream();
    tracks.push(...vStream.getAudioTracks());
  }

  if (audioMode.value==="upload" && audioFile.files[0]) {
    const audio = new Audio(URL.createObjectURL(audioFile.files[0]));
    const aStream = audio.captureStream();
    audio.play();
    tracks.push(...aStream.getAudioTracks());
  }

  if (audioMode.value==="record" && audioBlob) {
    const audio = new Audio(URL.createObjectURL(audioBlob));
    const aStream = audio.captureStream();
    audio.play();
    tracks.push(...aStream.getAudioTracks());
  }

  const mixedStream = new MediaStream(tracks);
  const recorder = new MediaRecorder(mixedStream);
  const chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  video.currentTime = 0;
  video.play();

  function draw() {
    ctx.drawImage(bg,0,0,1280,720);
    ctx.drawImage(video,230,160,900,470);
    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(230,540,900,80);
    ctx.fillStyle="yellow";
    ctx.font="bold 28px Arial";
    ctx.textAlign="center";
    ctx.fillText(details.innerText,680,590);
    if (!video.paused) requestAnimationFrame(draw);
  }
  draw();

  video.onended = () => {
    recorder.stop();
    recorder.onstop = () => {
      const blob = new Blob(chunks,{type:"video/webm"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${product.value}-${farmer.value}-${mobile.value}.mp4`;
      a.click();
    };
  };
}
</script>

</body>
</html>
